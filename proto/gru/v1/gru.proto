syntax = "proto3";

package gru.v1;

option go_package = "github.com/dakshjotwani/gru/proto/gru/v1;gruv1";

import "google/protobuf/timestamp.proto";

service GruService {
  // Sessions
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc GetSession(GetSessionRequest)     returns (Session);
  rpc LaunchSession(LaunchSessionRequest) returns (LaunchSessionResponse);
  rpc KillSession(KillSessionRequest)   returns (KillSessionResponse);
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);
  rpc PruneSessions(PruneSessionsRequest) returns (PruneSessionsResponse);
  rpc SendInput(SendInputRequest)       returns (SendInputResponse);

  // AI-powered session name suggestion
  rpc SuggestSessionName(SuggestSessionNameRequest) returns (SuggestSessionNameResponse);

  // Projects
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc UpdateProject(UpdateProjectRequest) returns (Project);
  rpc ListProfiles(ListProfilesRequest) returns (ListProfilesResponse);

  // Artifacts (byte payloads surfaced by an agent: PDFs, Markdown, etc.)
  // Creation is an HTTP multipart POST to /artifacts; this RPC surface is
  // for listing and deletion, mirroring the rest of the dashboard API.
  rpc ListArtifacts(ListArtifactsRequest)   returns (ListArtifactsResponse);
  rpc DeleteArtifact(DeleteArtifactRequest) returns (DeleteArtifactResponse);

  // Session links (external URLs an agent attaches to a session: PRs,
  // Slack threads, Figma files). All-gRPC since there are no bytes to
  // multipart-upload.
  rpc AddSessionLink(AddSessionLinkRequest)       returns (SessionLink);
  rpc ListSessionLinks(ListSessionLinksRequest)   returns (ListSessionLinksResponse);
  rpc DeleteSessionLink(DeleteSessionLinkRequest) returns (DeleteSessionLinkResponse);

  // Real-time event stream
  rpc SubscribeEvents(SubscribeEventsRequest) returns (stream SessionEvent);
}

enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED      = 0;
  SESSION_STATUS_STARTING         = 1;
  SESSION_STATUS_RUNNING          = 2;
  SESSION_STATUS_IDLE             = 3;
  SESSION_STATUS_NEEDS_ATTENTION  = 4;
  SESSION_STATUS_COMPLETED        = 5;
  SESSION_STATUS_ERRORED          = 6;
  SESSION_STATUS_KILLED           = 7;
}

message Session {
  string         id              = 1;
  string         project_id      = 2;
  string         runtime         = 3;
  SessionStatus  status          = 4;
  string         profile         = 5;
  double         attention_score = 6;
  google.protobuf.Timestamp started_at    = 7;
  google.protobuf.Timestamp ended_at      = 8;
  google.protobuf.Timestamp last_event_at = 9;
  int32          pid             = 10;
  string         tmux_session    = 11;
  string         tmux_window     = 12;
  string         name            = 13;  // human-readable, e.g. "auth-frontend-bugfix"
  string         description     = 14;  // what problem is being solved
  string         prompt          = 15;  // the initial prompt given to the agent
  string         role            = 16;  // "" for normal sessions; "journal" marks the server-managed singleton
}

// Project is a reference to an env spec on disk. Project.id is the absolute
// path to the spec.yaml file; Project.name is the directory basename (used
// for display). Workdirs, adapter config, and everything else about how a
// session runs lives in the spec file itself — Gru stores only the pointer.
message Project {
  string id        = 1;  // absolute path to spec.yaml (also the PK in SQLite)
  string name      = 2;  // display name (usually the directory basename)
  string adapter   = 3;  // cached from the spec for listing without a disk read
  string runtime   = 4;  // agent runtime, e.g. "claude-code"
  google.protobuf.Timestamp created_at = 5;
}

message SessionEvent {
  string id         = 1;
  string session_id = 2;
  string project_id = 3;
  string runtime    = 4;
  string type       = 5;
  google.protobuf.Timestamp timestamp = 6;
  bytes  payload    = 7;
}

message ListSessionsRequest {
  string        project_id = 1;
  SessionStatus status     = 2;
}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message GetSessionRequest {
  string id = 1;
}

// LaunchSessionRequest picks an env spec and launches an agent in it. The
// spec declares everything about where the session runs — workdirs,
// adapter, source isolation, mounts — so the launch payload is minimal.
message LaunchSessionRequest {
  // Required. Either an absolute path to a spec.yaml file, or a project
  // name that resolves to ~/.gru/projects/<name>/spec.yaml.
  string env_spec    = 1;

  string prompt      = 2;  // required
  string name        = 3;  // required, human-readable session label
  string description = 4;  // optional, what problem the session is solving
  string profile     = 5;  // optional agent profile name
}

message LaunchSessionResponse {
  Session session = 1;
}

message KillSessionRequest {
  string id = 1;
}

message KillSessionResponse {
  bool success = 1;
}

// DeleteSession removes a terminal (completed/errored/killed) session row
// and its events. Live sessions must be KillSessioned first — the server
// rejects the request if the session is still active.
message DeleteSessionRequest {
  string id = 1;
}

message DeleteSessionResponse {
  bool success = 1;
}

// PruneSessions removes every terminal session row at once. Assistant-role
// sessions are never deleted (server-managed). Intended for UI "clear
// completed" actions.
message PruneSessionsRequest {}

message PruneSessionsResponse {
  int32 deleted_count = 1;
}

message ListProjectsRequest {}

message ListProjectsResponse {
  repeated Project projects = 1;
}

// UpdateProjectRequest lets the UI rename a project (rename the directory
// under ~/.gru/projects/). Workdirs / adapter config are edited by hand in
// the spec file, not through the API.
message UpdateProjectRequest {
  string id       = 1;  // absolute spec path
  string new_name = 2;  // optional rename; empty = no change
}

message AgentProfile {
  string name        = 1;
  string description = 2;
  string model       = 3;
}

// ListProfilesRequest asks for agent profiles associated with a project.
// project_id is the spec path so the server can look at the spec's workdirs
// for local profile files (e.g. .gru/profiles.yaml inside workdirs[0]).
message ListProfilesRequest {
  string project_id = 1;
}

message ListProfilesResponse {
  repeated AgentProfile profiles = 1;
}

message SendInputRequest {
  string session_id = 1;
  string text       = 2;  // text to send via tmux send-keys
}

message SendInputResponse {
  bool   success       = 1;
  string error_message = 2;
}

message SubscribeEventsRequest {
  repeated string project_ids   = 1;
  double          min_attention = 2;
}

message SuggestSessionNameRequest {
  string prompt     = 1;
  string project_id = 2;  // absolute spec path
}

message SuggestSessionNameResponse {
  string name        = 1;
  string description = 2;
}

// Artifact: a byte payload (PDF, Markdown, etc.) surfaced by an agent.
// `url` is the full server-relative path including the capability token
// (e.g. /artifacts/<base64url-token>) — anyone holding that URL can fetch
// the bytes, anyone who doesn't cannot.
message Artifact {
  string id          = 1;
  string session_id  = 2;
  string title       = 3;
  string mime_type   = 4;
  int64  size_bytes  = 5;
  string url         = 6;
  google.protobuf.Timestamp created_at = 7;
}

message ListArtifactsRequest {
  string session_id = 1;
}

// ListArtifactsResponse exposes count + bytes_used so an agent can
// pre-check whether a planned upload will hit the per-session caps. The
// 409 cap-exceeded response from POST /artifacts returns the same fields.
message ListArtifactsResponse {
  repeated Artifact artifacts  = 1;
  int32             count      = 2;
  int64             bytes_used = 3;
}

message DeleteArtifactRequest  { string id = 1; }
message DeleteArtifactResponse { bool   success = 1; }

// SessionLink: an external URL pointer attached to a session. Icons are
// derived client-side from the URL hostname — the server does not store one.
message SessionLink {
  string id         = 1;
  string session_id = 2;
  string title      = 3;
  string url        = 4;
  google.protobuf.Timestamp created_at = 5;
}

message AddSessionLinkRequest {
  string session_id = 1;
  string title      = 2;
  string url        = 3;
}

message ListSessionLinksRequest {
  string session_id = 1;
}

message ListSessionLinksResponse {
  repeated SessionLink links = 1;
}

message DeleteSessionLinkRequest  { string id = 1; }
message DeleteSessionLinkResponse { bool   success = 1; }
